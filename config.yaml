# Face Recognition Client — DEFAULT configuration
# Edit this file, then run:   .venv/bin/python client.py <image>
#
# ┌─────────────────────────────────────────────────────────────────────────┐
# │ WHICH FACE MODEL?                                                        │
# │                                                                         │
# │ This client can recognise faces with one of two models. The mock server │
# │ enrols BOTH for every registration, so either works out of the box:     │
# │                                                                         │
# │   • dlib                  → the DEFAULT (set below). 128-dim.            │
# │   • YuNet + MobileFaceNet  → the alternate. 512-dim.                     │
# │                                                                         │
# │ To switch to YuNet + MobileFaceNet you have two options:                │
# │   1. Easiest — run with the ready-made preset instead of editing:       │
# │        .venv/bin/python client.py --config config.yunet.yaml <image>    │
# │   2. Or edit the two lines marked "SWITCH HERE" further down.           │
# └─────────────────────────────────────────────────────────────────────────┘

# ── Active mode ────────────────────────────────────────────────
# "server"     — send embeddings to the server; fall back to the local
#                diagnostic DB if the server is unreachable.
# "diagnostic" — local SQLite only, no network required.
mode: server

# ── Server settings (mode: server) ────────────────────────────
server:
  url: "http://localhost:8000"   # the mock server (am-mock-server/run.sh).
                                 # For a real am-master-server, put its address here.
  timeout: 10                    # per-request timeout in seconds

# ── Diagnostic / offline settings (mode: diagnostic) ──────────
diagnostic:
  db_path: ./diagnostic_mode/diagnostic.db
  faces_dir: ./diagnostic_mode/faces
  cosine_threshold: 0.6          # min cosine similarity to accept a match
  topk: 3                        # how many nearest neighbours to log on unknown

# ── Model paths (relative paths resolve against this file's dir) ─
models:
  yunet: ./models/face_detection_yunet_2023mar.onnx
  mobilefacenet: ./models/mobilefacenet.onnx

# ── Face detection ─────────────────────────────────────────────
detection:
  detector: dlib                  # <<< SWITCH HERE: dlib  (or "yunet" for the alternate)
  threshold: 0.3                  # detector confidence (dlib default 0.3, yunet default 0.5)
  input_size: 640                 # yunet letterbox size — higher finds smaller faces, slower
  num_upsamples: 1                # dlib only — higher finds smaller faces, slower

# ── Embedding extraction ───────────────────────────────────────
# Keep this paired with the detector above: dlib+dlib, or yunet+mobilefacenet.
# Never mix them — the server stores one vector per model and matches by which
# one you send.
embedder:
  model: dlib                     # <<< SWITCH HERE: dlib  (or "mobilefacenet" for the alternate)
  num_jitters: 1                  # dlib only — >1 = more stable embeddings, slower

# ── Camera ────────────────────────────────────────────────────
camera:
  device: 0                      # camera device index (0 = default webcam)
  frame_skip: 10                 # run recognition every N frames

# ── Logging ───────────────────────────────────────────────────
logging:
  level: INFO                    # DEBUG | INFO | WARNING | ERROR
