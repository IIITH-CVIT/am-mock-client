# Face Recognition Client Configuration
# Copy / edit this file, then run:
#   python client.py <image>

# ── Active mode ────────────────────────────────────────────────
# "server"     — send embeddings to the FRU API; fall back to diagnostic if
#                the server is unreachable.
# "diagnostic" — local SQLite only, no network required.
mode: server

# ── Server settings (mode: server) ────────────────────────────
server:
  url: "http://localhost:8100"
  timeout: 10                    # per-request timeout in seconds

# ── Diagnostic / offline settings (mode: diagnostic) ──────────
diagnostic:
  db_path: ./diagnostic_mode/diagnostic.db
  faces_dir: ./diagnostic_mode/faces
  cosine_threshold: 0.6          # min cosine similarity to accept a match
  topk: 3                        # how many nearest neighbours to log on unknown

# ── Model paths (relative paths resolve against this file's dir) ─
models:
  yunet: ./models/face_detection_yunet_2023mar.onnx
  mobilefacenet: ./models/mobilefacenet.onnx

# ── Face detection ─────────────────────────────────────────────
# Mirrors am-master-server's DlibBackend (app/core/face_rec.py):
# HOG detector, number_of_times_to_upsample=1, no confidence gate
# server-side. yunet (ONNX) is kept as the selectable alternate,
# matching am-master-server's AurafaceBackend instead.
detection:
  detector: dlib                  # dlib (HOG, matches server's DlibBackend) | yunet (ONNX, matches AurafaceBackend)
  threshold: 0.3                  # detector confidence threshold (dlib default 0.3, yunet default 0.5)
  input_size: 640                 # yunet letterbox size — higher finds smaller faces, slower
  num_upsamples: 1                # dlib only — higher finds smaller faces, slower

# ── Embedding extraction ───────────────────────────────────────
# dlib (128-dim) pairs with detector: dlib — matches server's
# dlib_threshold=0.6 (L2). mobilefacenet (512-dim) pairs with
# detector: yunet — matches server's auraface_threshold=0.8 (L2).
# Don't mix pairings; the server never re-derives embeddings from
# pixels, so vectors must match what's actually enrolled.
embedder:
  model: dlib                     # dlib (128-dim, matches server's DlibBackend) | mobilefacenet (512-dim, matches AurafaceBackend)
  num_jitters: 1                  # dlib only — >1 = more stable embeddings, slower

# ── Camera ────────────────────────────────────────────────────
camera:
  device: 0                      # camera device index (0 = default webcam)
  frame_skip: 10                 # run recognition every N frames

# ── Logging ───────────────────────────────────────────────────
logging:
  level: INFO                    # DEBUG | INFO | WARNING | ERROR
